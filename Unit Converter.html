<!DOCTYPE html>
<html class="dark" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>단위 변환기 - Unit Converter</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#3b82f6",
              "background-light": "#f8fafc",
              "background-dark": "#0f172a",
            },
            fontFamily: {
              display: ["Inter", "Noto Sans KR", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.75rem",
            },
          },
        },
      };

      function toggleTheme() {
        document.documentElement.classList.toggle('dark');
        const themeIcon = document.getElementById('theme-icon');
        if (document.documentElement.classList.contains('dark')) {
          themeIcon.innerText = 'light_mode';
        } else {
          themeIcon.innerText = 'dark_mode';
        }
      }
    </script>
    <style type="text/tailwindcss">
      body {
        font-family: 'Inter', 'Noto Sans KR', sans-serif;
        transition: background-color 0.3s ease;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
      }
      .glow-accent {
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
      }
      input::-webkit-outer-spin-button,
      input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center p-4">
    
    <!-- 테마 토글 버튼 -->
    <div class="fixed top-8 right-8">
        <button class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors duration-200" onclick="toggleTheme()">
            <span class="material-icons-round text-slate-600 dark:text-slate-400" id="theme-icon">light_mode</span>
        </button>
    </div>

    <div class="w-full max-w-2xl text-center space-y-8">
        <h1 class="text-4xl font-bold tracking-tight text-slate-800 dark:text-white">단위 변환기</h1>

        <!-- 메인 변환 카드 -->
        <div class="bg-white dark:bg-slate-800 rounded-3xl p-8 shadow-xl border border-slate-200 dark:border-slate-700">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                
                <!-- 입력 영역 -->
                <div class="flex-1 w-full space-y-4">
                    <div class="relative">
                        <select id="fromUnit" onchange="convert()" class="w-full appearance-none bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 pr-10 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all cursor-pointer">
                            <!-- JS에서 채워짐 -->
                        </select>
                        <span class="material-icons-round absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">expand_more</span>
                    </div>
                    <input id="fromValue" type="number" value="1" oninput="convert()" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-4 text-2xl font-semibold focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="값 입력"/>
                </div>

                <!-- 스왑 버튼 -->
                <div class="flex items-center justify-center">
                    <div onclick="swapUnits()" class="bg-primary/10 dark:bg-primary/20 p-3.5 rounded-2xl glow-accent border border-primary/20 transition-all cursor-pointer hover:bg-primary/20 dark:hover:bg-primary/30 group">
                        <span class="material-symbols-outlined text-primary text-3xl block md:rotate-0 rotate-90 transition-transform group-active:scale-90">sync_alt</span>
                    </div>
                </div>

                <!-- 결과 영역 -->
                <div class="flex-1 w-full space-y-4">
                    <div class="relative">
                        <select id="toUnit" onchange="convert()" class="w-full appearance-none bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 pr-10 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all cursor-pointer">
                            <!-- JS에서 채워짐 -->
                        </select>
                        <span class="material-icons-round absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">expand_more</span>
                    </div>
                    <div class="relative flex items-center">
                        <input id="toValue" type="number" readonly class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-4 pr-14 text-2xl font-semibold text-primary focus:outline-none transition-all" placeholder="결과"/>
                        <button onclick="copyResult()" title="결과 복사" class="absolute right-2 p-2 text-slate-400 hover:text-primary transition-colors focus:outline-none">
                            <span class="material-icons-round">content_copy</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 카테고리 탭 -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4" id="categoryTabs">
            <button onclick="changeCategory('length')" data-category="length" class="category-btn flex flex-col items-center justify-center gap-2 p-4 bg-primary text-white rounded-2xl shadow-lg shadow-primary/20 hover:scale-105 transition-transform">
                <span class="material-icons-round">straighten</span>
                <span class="font-medium">길이</span>
            </button>
            <button onclick="changeCategory('weight')" data-category="weight" class="category-btn flex flex-col items-center justify-center gap-2 p-4 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-2xl border border-slate-200 dark:border-slate-700 hover:border-primary dark:hover:border-primary hover:text-primary dark:hover:text-primary transition-all">
                <span class="material-icons-round">scale</span>
                <span class="font-medium">무게</span>
            </button>
            <button onclick="changeCategory('capacity')" data-category="capacity" class="category-btn flex flex-col items-center justify-center gap-2 p-4 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-2xl border border-slate-200 dark:border-slate-700 hover:border-primary dark:hover:border-primary hover:text-primary dark:hover:text-primary transition-all">
                <span class="material-icons-round">opacity</span>
                <span class="font-medium">부피</span>
            </button>
            <button onclick="changeCategory('pressure')" data-category="pressure" class="category-btn flex flex-col items-center justify-center gap-2 p-4 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-2xl border border-slate-200 dark:border-slate-700 hover:border-primary dark:hover:border-primary hover:text-primary dark:hover:text-primary transition-all">
                <span class="material-icons-round">compress</span>
                <span class="font-medium">압력</span>
            </button>
        </div>

        <!-- 유틸리티 버튼 -->
        <div class="flex justify-center gap-3 pt-4">
            <button onclick="resetValues()" title="초기화" class="p-3 bg-white dark:bg-slate-800 text-slate-400 rounded-xl border border-slate-200 dark:border-slate-700 hover:text-primary transition-colors">
                <span class="material-icons-round">refresh</span>
            </button>
        </div>
    </div>

    <!-- 배경 장식 -->
    <div class="fixed -z-10 top-0 left-0 w-full h-full overflow-hidden pointer-events-none opacity-20 dark:opacity-10">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-indigo-500 blur-[120px] rounded-full"></div>
    </div>

    <script>
        const unitData = {
            length: {
                units: {
                    mm: { name: "밀리미터 (mm)", rate: 0.001 },
                    cm: { name: "센티미터 (cm)", rate: 0.01 },
                    m: { name: "미터 (m)", rate: 1 },
                    km: { name: "킬로미터 (km)", rate: 1000 },
                    inch: { name: "인치 (inch)", rate: 0.0254 },
                    ft: { name: "피트 (ft)", rate: 0.3048 },
                    yd: { name: "야드 (yd)", rate: 0.9144 },
                    mile: { name: "마일 (mile)", rate: 1609.34 }
                },
                default: ['cm', 'inch']
            },
            weight: {
                units: {
                    mg: { name: "밀리그램 (mg)", rate: 0.001 },
                    g: { name: "그램 (g)", rate: 1 },
                    kg: { name: "킬로그램 (kg)", rate: 1000 },
                    t: { name: "톤 (t)", rate: 1000000 },
                    oz: { name: "온스 (oz)", rate: 28.3495 },
                    lb: { name: "파운드 (lb)", rate: 453.592 }
                },
                default: ['kg', 'g']
            },
            capacity: {
                units: {
                    ml: { name: "밀리리터 (ml)", rate: 0.001 },
                    l: { name: "리터 (l)", rate: 1 },
                    gal: { name: "갤런 (gal)", rate: 3.78541 },
                    pt: { name: "파인트 (pt)", rate: 0.473176 },
                    qt: { name: "쿼트 (qt)", rate: 0.946353 }
                },
                default: ['l', 'ml']
            },
            pressure: {
                units: {
                    pa: { name: "파스칼 (Pa)", rate: 1 },
                    hpa: { name: "헥토파스칼 (hPa)", rate: 100 },
                    bar: { name: "바 (bar)", rate: 100000 },
                    psi: { name: "psi", rate: 6894.76 },
                    atm: { name: "기압 (atm)", rate: 101325 }
                },
                default: ['bar', 'psi']
            }
        };

        let currentCategory = 'length';

        function init() {
            updateUnitSelects();
            convert();
        }

        function updateUnitSelects() {
            const fromSelect = document.getElementById('fromUnit');
            const toSelect = document.getElementById('toUnit');
            const data = unitData[currentCategory];
            
            fromSelect.innerHTML = '';
            toSelect.innerHTML = '';

            Object.keys(data.units).forEach(key => {
                const opt1 = new Option(data.units[key].name, key);
                const opt2 = new Option(data.units[key].name, key);
                fromSelect.add(opt1);
                toSelect.add(opt2);
            });

            fromSelect.value = data.default[0];
            toSelect.value = data.default[1];
        }

        function changeCategory(category) {
            currentCategory = category;
            
            // 버튼 스타일 업데이트
            document.querySelectorAll('.category-btn').forEach(btn => {
                if (btn.dataset.category === category) {
                    btn.classList.add('bg-primary', 'text-white', 'shadow-lg', 'shadow-primary/20');
                    btn.classList.remove('bg-white', 'dark:bg-slate-800', 'text-slate-600', 'dark:text-slate-300', 'border');
                } else {
                    btn.classList.remove('bg-primary', 'text-white', 'shadow-lg', 'shadow-primary/20');
                    btn.classList.add('bg-white', 'dark:bg-slate-800', 'text-slate-600', 'dark:text-slate-300', 'border');
                }
            });

            updateUnitSelects();
            convert();
        }

        function convert() {
            const fromValue = parseFloat(document.getElementById('fromValue').value);
            const fromUnit = document.getElementById('fromUnit').value;
            const toUnit = document.getElementById('toUnit').value;
            const toInput = document.getElementById('toValue');

            if (isNaN(fromValue)) {
                toInput.value = '';
                return;
            }

            const data = unitData[currentCategory].units;
            // 기준 단위(rate: 1)로 변환 후 목표 단위로 변환
            const baseValue = fromValue * data[fromUnit].rate;
            const result = baseValue / data[toUnit].rate;

            // 소수점 처리 (최대 6자리, 불필요한 0 제거)
            toInput.value = parseFloat(result.toFixed(6));
        }

        function swapUnits() {
            const fromSelect = document.getElementById('fromUnit');
            const toSelect = document.getElementById('toUnit');
            const tempUnit = fromSelect.value;
            
            fromSelect.value = toSelect.value;
            toSelect.value = tempUnit;
            
            convert();
        }

        function copyResult() {
            const toValue = document.getElementById('toValue').value;
            if (!toValue) return;
            
            navigator.clipboard.writeText(toValue).then(() => {
                alert('결과가 클립보드에 복사되었습니다!');
            });
        }

        function resetValues() {
            document.getElementById('fromValue').value = 1;
            convert();
        }

        // 초기 실행
        init();
    </script>
</body>
</html>
