<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>심플 단위 변환기</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; }
        h2 { margin-top: 0; color: #333; font-size: 1.2rem; }
        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #666; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        .result { background: #e7f3ff; padding: 15px; border-radius: 6px; text-align: center; font-weight: bold; color: #007bff; }
    </style>
</head>
<body>

<div class="card">
    <h2>길이 변환기 (cm ↔ inch)</h2>
    
    <div class="input-group">
        <label>값 입력</label>
        <input type="number" id="inputValue" placeholder="숫자를 입력하세요" oninput="convert()">
    </div>

    <div class="input-group">
        <label>단위 선택</label>
        <select id="unitType" onchange="convert()">
            <option value="cmToInch">센티미터(cm) → 인치(inch)</option>
            <option value="inchToCm">인치(inch) → 센티미터(cm)</option>
        </select>
    </div>

    <div class="result" id="resultDisplay">
        결과가 여기에 표시됩니다.
    </div>
</div>

<script>
    function convert() {
        const value = document.getElementById('inputValue').value;
        const type = document.getElementById('unitType').value;
        const display = document.getElementById('resultDisplay');

        if (value === "") {
            display.innerText = "숫자를 입력해주세요.";
            return;
        }

        let result;
        if (type === "cmToInch") {
            // 1 cm = 0.393701 inch
            result = (value * 0.393701).toFixed(2) + " inch";
        } else {
            // 1 inch = 2.54 cm
            result = (value * 2.54).toFixed(2) + " cm";
        }

        display.innerText = "결과: " + result;
    }
</script>

</body>
</html>
